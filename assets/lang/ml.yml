welcome:
  title:        "TEAMDEV x NEURALHUB"
  body: |
    സന്ദേശം അയക്കുക  ->  AI ഉടന്‍ മറുപടി നല്‍കും
    /img <prompt>  ->  ചിത്രം നിര്‍മ്മിക്കുക
    /dl <url>  ->  മീഡിയ ഡൗണ്‍ലോഡ് ചെയ്യുക
    /tb <url>  ->  Terabox ഫയലുകള്‍
  footer:       "@TEAM_X_OG ശക്തിപ്പെടുത്തിയത്"

