welcome:
  title:        "TEAMDEV x NEURALHUB"
  body: |
    メッセージを送信  ->  AIがすぐに返信します
    /img <プロンプト>  ->  画像を生成する
    /dl <url>  ->  メディアをダウンロード
    /tb <url>  ->  Teraboxファイル
  footer:       "@TEAM_X_OGが提供"

lang:
  header:       "言語を選択"
  set:          "言語が設定されました: {lang}"
  current:      "現在: {lang}"

sub:
  header:       "サブスクリプションプラン"
  free:
    name:       "無料"
    features: |
      ダウンロード : 5/日
      クールダウン : 5分
      PM/月       : 150
      画像/日     : 2
  basic:
    name:       "ベーシック"
    features: |
      ダウンロード : 15/日
      クールダウン : 2分
      PM/月       : 300
      画像/日     : 5
  pro:
    name:       "プロ"
    features: |
      ダウンロード : 30/日
      クールダウン : 1分
      PM/月       : 1000
      画像/日     : 20
  ultra:
    name:       "ウルトラ"
    features: |
      ダウンロード : 100/日
      クールダウン : 10秒
      PM/月       : 5000
      画像/日     : 50
  ultra_pro:
    name:       "ウルトラプロ"
    features: |
      ダウンロード : 無制限
      クールダウン : なし
      PM/月       : 無制限
      画像/日     : 無制限
