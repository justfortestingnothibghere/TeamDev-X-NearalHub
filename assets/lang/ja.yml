  plan:         "プラン      >  {plan}"
  pm_used:      "PM (月)    >  {used}/{limit}"
  group_used:   "グループ   >  {used}/{limit}"
  img_used:     "画像       >  {used}/{limit}"
  dl_used:      "ダウンロード >  {used}/{limit}"
  cooldown:     "クールダウン >  {seconds}s"
  resets:       "リセット   >  {date}"

error:
  cooldown:     "クールダウン中です — {seconds}s後に再送信してください。"
  pm_limit:     "月間PMの上限に達しました ({limit}).\n\nプランをアップグレードしてください!"
  group_limit:  "月間グループの上限に達しました ({limit})。"
  img_limit:    "1日の画像上限に達しました ({limit}).\n\nアップグレードしてください!"
  dl_limit:     "1日のダウンロード上限に達しました ({limit}).\n\nアップグレードしてください!"
  api_error:    "APIエラー: {message}"
  timeout:      "リクエストがタイムアウトしました。もう一度試してください。"
  no_prompt:    "使い方: /img あなたのプロンプト"
  unknown:      "エラーが発生しました。後でもう一度試してください。"
  no_access:    "アクセスが拒否されました。"

ai:
  thinking:     "考えています..."
