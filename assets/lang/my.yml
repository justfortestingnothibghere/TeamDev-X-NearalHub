    စာပို့ပါ  ->  AI ချက်ချင်းဖြေဆိုပါမည်
    /img <prompt>  ->  ပုံဖန်တီးပါ
    /dl <url>  ->  မီဒီယာဒေါင်းလုဒ်လုပ်ပါ
