
btn:
  subscribe:    "திட்டங்கள்"
  cancel:       "ரத்து செய்"
  confirm:      "உறுதிப்படுத்து"
  back:         "< பின்னால்"
  upgrade:      "மேம்படுத்து"
  status:       "என் நிலை"
  help:         "உதவி"
  admin:        "நிர்வாக பலகை"
  language:     "மொழி"

welcome:
  title:        "TEAMDEV x NEURALHUB"
  body: |
    செய்தி அனுப்பு  ->  AI உடனடியாக பதிலளிக்கும்
    /img <prompt>  ->  படம் உருவாக்கு
    /dl <url>  ->  மீடியா பதிவிறக்கு
    /tb <url>  ->  Terabox கோப்புகள்
  footer:       "@TEAM_X_OG ஆல் இயக்கப்படுகிறது"

lang:
  header:       "மொழி தேர்ந்தெடுக்கவும்"
  set:          "மொழி அமைக்கப்பட்டது: {lang}"
  current:      "தற்போது: {lang}"

sub:
  header:       "சந்தா திட்டங்கள்"
  free:
    name:       "இலவசம்"
    features: |
      பதிவிறக்கங்கள் : 5/நாள்
      குளிர்விக்கும் நேரம் : 5 நிமி
      PM/மாதம்    : 150
      படங்கள்/நாள் : 2
  basic:
    name:       "அடிப்படை"
    features: |
      பதிவிறக்கங்கள் : 15/நாள்
      குளிர்விக்கும் நேரம் : 2 நிமி
      PM/மாதம்    : 300
      படங்கள்/நாள் : 5
  pro:
    name:       "புரோ"
    features: |
      பதிவிறக்கங்கள் : 30/நாள்
      குளிர்விக்கும் நேரம் : 1 நிமி
      PM/மாதம்    : 1000
      படங்கள்/நாள் : 20
  ultra:
    name:       "அல்ட்ரா"
    features: |
      பதிவிறக்கங்கள் : 100/நாள்
      குளிர்விக்கும் நேரம் : 10 நொடி
      PM/மாதம்    : 5000
      படங்கள்/நாள் : 50
  ultra_pro:
    name:       "அல்ட்ரா புரோ"
    features: |
      பதிவிறக்கங்கள் : வரம்பற்றது
      குளிர்விக்கும் நேரம் : இல்லை
      PM/மாதம்    : வரம்பற்றது
      படங்கள்/நாள் : வரம்பற்றது
  current:      "உங்கள் திட்டம் : {plan}"
  upgrade_hint: "மேம்படுத்த @TEAM_X_OG ஐ தொடர்பு கொள்ளவும்."

status:
  header:       "பயன்பாட்டு நிலை"
  plan:         "திட்டம்       >  {plan}"
  pm_used:      "PM (மாதம்)   >  {used}/{limit}"
  group_used:   "குழு         >  {used}/{limit}"
  img_used:     "படங்கள்      >  {used}/{limit}"
  dl_used:      "பதிவிறக்கங்கள் >  {used}/{limit}"
  cooldown:     "குளிர்விக்கும் நேரம் >  {seconds}s"
  resets:       "மீட்டமைப்பு  >  {date}"

error:
  cooldown:     "குளிர்விக்கும் நேரம் செயல்பாட்டில் — {seconds}s கழித்து மீண்டும் அனுப்பவும்."
  pm_limit:     "மாதாந்திர PM வரம்பை எட்டியது ({limit}).\n\nமேலும் கோட்பாடுகளுக்கு மேம்படுத்தவும்!"
  group_limit:  "மாதாந்திர குழு வரம்பை எட்டியது ({limit})."
  img_limit:    "தினசரி படங்கள் வரம்பை எட்டியது ({limit}).\n\nமேலும் படங்களுக்கு மேம்படுத்தவும்!"
  dl_limit:     "தினசரி பதிவிறக்க வரம்பை எட்டியது ({limit}).\n\nமேலும் பதிவிறக்கங்களுக்கு மேம்படுத்தவும்!"
  api_error:    "API பிழை: {message}"
  timeout:      "கோரிக்கை நேரம் முடிந்தது. மீண்டும் முயற்சிக்கவும்."
  no_prompt:    "பயன்பாடு: /img உங்கள் prompt"
  unknown:      "ஏதோ தவறு நடந்தது. பின்னர் மீண்டும் முயற்சிக்கவும்."
  no_access:    "அணுகல் மறுக்கப்பட்டது."

ai:
  thinking:     "யோசிக்கிறேன்..."
  generating:   "உருவாக்குகிறேன்..."
  chunk_footer: "-- பகுதி {n} of {total} --"
  no_response:  "பதில் எதுவும் பெறவில்லை."

admin:
  header:       "நிர்வாக பலகை"
  updated:      "கட்டமைப்பு புதுப்பிக்கப்பட்டது: {key} = {value}"
  user_info:    "{uid} | {plan} | PM: {pm} | குழு: {grp}"
  grant_pro:    "{uid} க்கு திட்டம் வழங்கப்பட்டது."
  revoke_pro:   "{uid} இடமிருந்து திட்டம் திரும்பப் பெறப்பட்டது."
  not_admin:    "நீங்கள் நிர்வாகி இல்லை."
  stats:        "மொத்தம்: {total} | புரோ: {pro} | இலவசம்: {free}"

dl:
  fetching:     "மீடியா தகவல் பெறுகிறேன்..."
  downloading:  "பதிவிறக்குகிறேன்..."
  no_media:     "இந்த URL இல் பதிவிறக்கக்கூடிய மீடியா எதுவும் இல்லை."
  error:        "பதிவிறக்கம் தோல்வியடைந்தது: {error}"
  link_label:   "பதிவிறக்கு"
